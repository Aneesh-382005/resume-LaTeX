name: Build and Publish Resume PDF

on:
  push:
    branches:
      - main
    paths:
      - src/main.tex
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: resume-pdf
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure dist directory exists
        run: mkdir -p dist

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: src/main.tex
          work_in_root_file_dir: true

      - name: Place public PDF at required path
        run: mv src/main.pdf dist/Aneesh_Grover_Resume.pdf

      - name: Upload compiled PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: dist/Aneesh_Grover_Resume.pdf

      - name: Commit updated PDF back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/Aneesh_Grover_Resume.pdf
          if git diff --cached --quiet; then
            echo "No PDF changes to commit."
            exit 0
          fi
          git commit -m "Update resume PDF [skip ci]"
          git push origin HEAD:main
